<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quint</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { 
            margin: 0;
            overflow: hidden;
        }
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: gold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
            z-index: 1000;
        }
        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #enter-button {
            background-color: gold;
            border: none;
            color: black;
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            border-radius: 5px;
        }
        #corner-decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .decoration {
            position: absolute;
            background: gold;
            opacity: 0.3;
            pointer-events: none;
        }
        .dec-left-top {
            top: 0;
            left: 0;
            width: 50px;
            height: 50px;
            border-radius: 0 50% 0 0;
        }
        .dec-right-top {
            top: 0;
            right: 0;
            width: 50px;
            height: 50px;
            border-radius: 50% 0 0 0;
        }
        .dec-left-bottom {
            bottom: 0;
            left: 0;
            width: 50px;
            height: 50px;
            border-radius: 0 0 50% 0;
        }
        .dec-right-bottom {
            bottom: 0;
            right: 0;
            width: 50px;
            height: 50px;
            border-radius: 0 0 0 50%;
        }
    </style>
</head>
<body>
    <div id="splash">
        <button id="enter-button">ENTER</button>
        <div id="corner-decorations">
            <div class="decoration dec-left-top"></div>
            <div class="decoration dec-right-top"></div>
            <div class="decoration dec-left-bottom"></div>
            <div class="decoration dec-right-bottom"></div>
        </div>
    </div>
    <script>
        document.getElementById('enter-button').onclick = function() {
            var splash = document.getElementById('splash');
            splash.classList.add('hidden');
            // Trigger music to play here
            var audio = new Audio('path/to/music.mp3');
            audio.play();
        };
    </script>
</body>
</html>
